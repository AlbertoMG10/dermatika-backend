<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DERMÁTIKA | Evaluación médica</title>
  <meta name="description" content="Completa tu evaluación médica digital de DERMÁTIKA para definir un protocolo dermatológico personalizado para acné.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F1B2D'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-family='Arial,sans-serif' font-size='34' font-weight='700' fill='%234AAFC0'%3ED%3C/text%3E%3C/svg%3E">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.googletagmanager.com https://www.google-analytics.com; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://www.google-analytics.com https://www.googletagmanager.com; base-uri 'self'; form-action 'self' https://hooks.stripe.com; frame-ancestors 'none'; object-src 'none'">
  <script src="https://js.stripe.com/v3/" async></script>
  <style>
    :root {
      --teal: #4AAFC0;
      --ink: #0F1B2D;
      --paper: #F6FAFC;
      --white: #FFFFFF;
      --muted: #53657A;
      --line: rgba(15, 27, 45, 0.12);
      --soft: rgba(74, 175, 192, 0.12);
      --shadow: 0 24px 70px rgba(15, 27, 45, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(74, 175, 192, 0.16), transparent 34%),
        var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: clamp(16px, 4vw, 36px);
    }

    .topbar {
      display: grid;
      gap: 18px;
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .brand {
      display: inline-grid;
      gap: 4px;
      justify-self: start;
      font-weight: 850;
      letter-spacing: 8px;
    }

    .brand span {
      font-size: clamp(19px, 3vw, 25px);
    }

    .brand span::after {
      content: "*";
      margin-left: 2px;
      color: var(--teal);
    }

    .brand small {
      color: var(--muted);
      font-size: 9px;
      font-weight: 750;
      letter-spacing: 2.2px;
      text-transform: uppercase;
    }

    .progress-track {
      display: none;
      height: 8px;
      overflow: hidden;
      background: rgba(83, 101, 122, 0.16);
      border-radius: 999px;
    }

    .progress-track.is-active {
      display: block;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--teal);
      border-radius: inherit;
      transition: width 260ms ease;
    }

    .progress-meta {
      display: none;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .progress-meta.is-active {
      display: flex;
    }

    .shell {
      display: grid;
      place-items: center;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(28px, 6vw, 60px) 0;
    }

    .card {
      width: min(760px, 100%);
      padding: clamp(24px, 5vw, 48px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: enter 320ms ease both;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .intro {
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1,
    h2 {
      margin-bottom: 16px;
      color: var(--ink);
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.06;
      letter-spacing: 0;
    }

    .intro p,
    .question-help {
      color: var(--muted);
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.65;
    }

    .question-help {
      margin-bottom: 26px;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-bottom: 28px;
    }

    .option-card {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 72px;
      padding: 18px 20px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .option-card:hover {
      transform: translateY(-1px);
      border-color: var(--teal);
      box-shadow: 0 14px 30px rgba(15, 27, 45, 0.06);
    }

    .option-card input {
      position: absolute;
      opacity: 0;
    }

    .option-card span {
      display: grid;
      gap: 4px;
      color: var(--muted);
      line-height: 1.4;
    }

    .option-card strong {
      color: var(--ink);
      font-size: 18px;
    }

    .option-card:has(input:checked) {
      background: var(--soft);
      border-color: var(--teal);
      box-shadow: inset 0 0 0 1px var(--teal);
    }

    .fields {
      display: grid;
      gap: 14px;
      margin-bottom: 26px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      color: var(--ink);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .field textarea {
      min-height: 116px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px var(--soft);
    }

    .check-field {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      color: var(--muted);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
      font-weight: 750;
      line-height: 1.45;
    }

    .check-field input {
      flex: 0 0 20px;
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--teal);
    }

    .field-error {
      min-height: 18px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    .bot-field {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .privacy-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: -4px;
    }

    .privacy-link {
      width: fit-content;
      padding: 0;
      color: var(--teal);
      background: transparent;
      border: 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
    }

    .privacy-link:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .privacy-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(15, 27, 45, 0.34);
      backdrop-filter: blur(16px);
    }

    .privacy-modal.is-open {
      display: grid;
      animation: modalFade 180ms ease both;
    }

    .privacy-dialog {
      width: min(720px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      overflow: hidden;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 30px;
      box-shadow: 0 34px 90px rgba(15, 27, 45, 0.24);
      animation: modalEnter 220ms ease both;
    }

    .privacy-dialog header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: clamp(22px, 4vw, 34px) clamp(22px, 4vw, 36px) 18px;
      border-bottom: 1px solid var(--line);
    }

    .privacy-dialog h2 {
      margin: 0;
      font-size: clamp(25px, 4vw, 36px);
    }

    .privacy-close {
      display: grid;
      place-items: center;
      flex: 0 0 42px;
      width: 42px;
      height: 42px;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
    }

    .privacy-content {
      display: grid;
      gap: 16px;
      max-height: min(520px, calc(100vh - 230px));
      overflow: auto;
      padding: 22px clamp(22px, 4vw, 36px) clamp(22px, 4vw, 36px);
      scroll-behavior: smooth;
    }

    .privacy-content p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .privacy-points {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 4px 0;
    }

    .privacy-points span {
      padding: 14px;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.35;
    }

    @keyframes modalFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modalEnter {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 0 26px;
      color: var(--white);
      background: var(--teal);
      border: 1px solid var(--teal);
      border-radius: 999px;
      box-shadow: 0 18px 34px rgba(74, 175, 192, 0.22);
      cursor: pointer;
      font-weight: 850;
      transition: transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 22px 42px rgba(74, 175, 192, 0.28);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      box-shadow: none;
    }

    .button-secondary {
      color: var(--ink);
      background: var(--white);
      border-color: var(--line);
      box-shadow: none;
    }

    .button-secondary:hover:not(:disabled) {
      box-shadow: 0 12px 28px rgba(15, 27, 45, 0.08);
    }

    .button-full {
      width: 100%;
      margin-top: 18px;
    }

    .legal {
      width: min(980px, 100%);
      margin: 0 auto;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
    }

    .eval-social-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 14px;
    }

    .eval-social-links a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 8px 12px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(74, 175, 192, 0.18);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .eval-social-links a:hover {
      transform: translateY(-2px);
      border-color: rgba(74, 175, 192, 0.42);
      box-shadow: 0 14px 34px rgba(74, 175, 192, 0.12);
    }

    .eval-social-links span {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      color: var(--white);
      background: var(--ink);
      border-radius: 50%;
      font-size: 9px;
      font-weight: 950;
    }

    .summary-note {
      margin: 18px 0 0;
      padding: 14px 16px;
      color: var(--ink);
      background: var(--soft);
      border: 1px solid rgba(74, 175, 192, 0.22);
      border-radius: 16px;
      font-weight: 750;
      line-height: 1.45;
    }

    .process-loader {
      display: grid;
      gap: 14px;
      margin: 24px auto;
      padding: 18px;
      max-width: 430px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
    }

    .process-loader span {
      height: 8px;
      overflow: hidden;
      background: rgba(83, 101, 122, 0.16);
      border-radius: 999px;
    }

    .process-loader span::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      background: var(--teal);
      border-radius: inherit;
      animation: loadingSweep 1.8s ease-in-out infinite;
    }

    .process-loader p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    @keyframes loadingSweep {
      0% {
        transform: translateX(-110%);
      }
      50% {
        transform: translateX(70%);
      }
      100% {
        transform: translateX(240%);
      }
    }

    .result-card {
      width: min(860px, 100%);
      padding: clamp(22px, 4.5vw, 42px);
    }

    .result-hero {
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
    }

    .result-kicker {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      gap: 9px;
      padding: 9px 12px;
      color: var(--ink);
      background: var(--soft);
      border: 1px solid rgba(74, 175, 192, 0.24);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 850;
    }

    .result-kicker::before {
      content: "✓";
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      color: var(--white);
      background: var(--teal);
      border-radius: 50%;
      font-size: 13px;
      font-weight: 900;
    }

    .result-hero h1 {
      max-width: 680px;
      margin-bottom: 0;
      font-size: clamp(30px, 4.5vw, 46px);
    }

    .result-hero p {
      max-width: 680px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .review-card {
      position: relative;
      display: grid;
      gap: 18px;
      margin: 24px 0;
      padding: clamp(18px, 4vw, 28px);
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(74, 175, 192, 0.16), transparent 34%),
        var(--white);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: 0 18px 44px rgba(15, 27, 45, 0.07);
    }

    .review-card h2 {
      margin-bottom: 0;
      font-size: clamp(26px, 4vw, 38px);
    }

    .review-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .review-item {
      display: grid;
      gap: 5px;
      min-height: 88px;
      padding: 16px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .review-item span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .review-item strong {
      color: var(--ink);
      font-size: clamp(17px, 3vw, 22px);
      line-height: 1.22;
    }

    .ok-note {
      margin: 0;
      padding: 15px 16px;
      color: var(--ink);
      background: var(--soft);
      border: 1px solid rgba(74, 175, 192, 0.24);
      border-radius: 18px;
      font-weight: 800;
      line-height: 1.45;
    }

    .identity-panel {
      display: grid;
      gap: 16px;
      margin-top: 18px;
      padding: clamp(18px, 4vw, 28px);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 26px;
    }

    .identity-panel h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
    }

    .secure-note {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .contact-hero {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
      text-align: center;
    }

    .contact-hero h1 {
      margin-bottom: 0;
      font-size: clamp(30px, 4.8vw, 44px);
    }

    .contact-hero p {
      margin: 0 auto;
      max-width: 560px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .post-eligibility {
      width: min(1180px, 100%);
      animation: enter 320ms ease both;
    }

    .approval-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
      padding: 14px 18px;
      color: var(--white);
      background: var(--ink);
      border-radius: 999px;
      box-shadow: 0 18px 44px rgba(15, 27, 45, 0.18);
      text-align: center;
      font-size: clamp(12px, 2vw, 14px);
      font-weight: 900;
      letter-spacing: 0.9px;
      text-transform: uppercase;
    }

    .approval-countdown {
      display: inline-flex;
      min-width: 58px;
      justify-content: center;
      color: var(--ink);
      background: var(--white);
      border-radius: 999px;
      padding: 5px 9px;
    }

    .post-hero {
      display: grid;
      gap: 12px;
      max-width: 820px;
      margin: 0 auto 26px;
      text-align: center;
    }

    .post-hero h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
    }

    .post-hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 2.2vw, 21px);
      line-height: 1.6;
    }

    .post-section {
      margin-top: 22px;
      padding: clamp(22px, 4vw, 34px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .case-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .case-summary article,
    .goal-card,
    .include-card,
    .plan-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 22px;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .case-summary article {
      display: grid;
      gap: 7px;
      min-height: 116px;
      padding: 18px;
    }

    .case-summary article:hover,
    .goal-card:hover,
    .include-card:hover,
    .plan-card:hover {
      transform: translateY(-3px);
      border-color: rgba(74, 175, 192, 0.44);
      box-shadow: 0 18px 38px rgba(15, 27, 45, 0.08);
    }

    .case-summary span,
    .post-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.9px;
      text-transform: uppercase;
    }

    .case-summary strong {
      color: var(--ink);
      font-size: clamp(17px, 2.5vw, 23px);
      line-height: 1.2;
    }

    .recommendation {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.8fr);
      gap: clamp(20px, 4vw, 34px);
      align-items: center;
    }

    .recommendation h2,
    .post-section h2 {
      font-size: clamp(28px, 4vw, 42px);
    }

    .recommendation p,
    .post-section > p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .post-badge {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 16px;
      padding: 8px 12px;
      color: var(--teal);
      background: var(--soft);
      border: 1px solid rgba(74, 175, 192, 0.28);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .trust-box {
      margin-top: 18px;
      padding: 16px;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      font-weight: 800;
      line-height: 1.45;
    }

    .recommendation img {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 18px 42px rgba(15, 27, 45, 0.1);
    }

    .goal-grid,
    .include-grid,
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));

    .checkout-form .payment-status {
      grid-column: 1 / -1;

    .payment-note {
      margin: 0;
      padding: 14px 16px;
      color: var(--checkout-muted);
      background: color-mix(in srgb, var(--checkout-bg) 72%, #FFFFFF 28%);
      border: 1px solid var(--checkout-line);
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .payment-status {
      display: none;
      margin: 0;
      padding: 14px 16px;
      color: var(--checkout-text);
      background: color-mix(in srgb, var(--checkout-accent) 14%, transparent);
      border: 1px solid var(--checkout-line);
      border-radius: 18px;
      font-size: 14px;
      font-weight: 760;
      line-height: 1.45;
    }

    .payment-status.is-visible {
      display: block;
    }

    .stripe-payment-panel {
      display: none;
      grid-column: 1 / -1;
      padding: 18px;
      border: 1px solid var(--checkout-line);
      border-radius: 22px;
      background: color-mix(in srgb, var(--checkout-panel) 84%, #FFFFFF 16%);
      box-shadow: 0 18px 42px color-mix(in srgb, var(--checkout-accent) 16%, transparent);
    }

    .stripe-payment-panel.is-visible {
      display: grid;
      gap: 12px;
      animation: fadeUp 0.28s ease both;
    }

    .stripe-payment-panel h3 {
      margin: 0;
      font-size: 18px;
    }

    .stripe-payment-panel p {
      margin: 0;
      color: var(--checkout-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .stripe-element-box {
      min-height: 112px;
      padding: 14px;
      border: 1px solid var(--checkout-line);
      border-radius: 18px;
      background: color-mix(in srgb, var(--checkout-panel) 90%, #FFFFFF 10%);
    }

    .stripe-element-box.is-loading {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .payment-error {
      min-height: 18px;
      color: #b42318;
      font-size: 13px;
      font-weight: 800;
    }

    .payment-success {
      display: none;
      padding: 12px 14px;
      border-radius: 16px;
      background: color-mix(in srgb, var(--checkout-accent) 10%, transparent);
      color: var(--checkout-text);
      font-weight: 800;
    }

    .payment-success.is-visible {
      display: block;
    }

    .checkout .button.button-full {
      border-radius: 18px;
      background: var(--checkout-accent);
      color: var(--checkout-button-text);
      box-shadow: 0 18px 34px color-mix(in srgb, var(--checkout-accent) 30%, transparent);
    }

    .checkout .button.button-full:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 22px 40px color-mix(in srgb, var(--checkout-accent) 36%, transparent);

    .testimonial-mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;

    .testimonial-mini {
      padding: 20px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 22px;
      color: var(--muted);
      line-height: 1.55;
      box-shadow: 0 14px 32px rgba(15, 27, 45, 0.06);

    .testimonial-mini strong {
      display: block;
      margin-top: 14px;
      color: var(--ink);
    }

    .urgency-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .faq-item {
      border-bottom: 1px solid var(--line);

    .faq-question {
      display: flex;
      align-items: center;

      padding: 18px 0;
      color: var(--ink);
      background: transparent;
      border: 0;
      cursor: pointer;
      text-align: left;
      font-weight: 900;
    }

    .faq-question::after {
      content: "+";
      color: var(--teal);
      font-size: 24px;
    }

    .faq-item.is-open .faq-question::after {

    .faq-answer {

      line-height: 1.6;
    }

    .faq-item.is-open .faq-answer {
      display: block;

    .reveal-post {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 520ms ease, transform 520ms ease;
    }

    .reveal-post.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {

        padding: 16px;

        letter-spacing: 5px;

        border-radius: 24px;

    @media (prefers-reduced-motion: reduce) {

  <script>
    const questions = [
      {
        id: "ageRange",
        title: "¿Cuál es tu edad?",
        type: "single",
        options: ["Menor de 12 años", "12 a 17 años", "18 a 35 años", "36 años o más"]
      },
      {
        id: "acneSeverity",
        title: "¿Cómo describirías tu acné actualmente?",
        type: "single",
        options: [
          { label: "Leve", help: "Puntos negros o brotes ocasionales" },
          { label: "Moderado", help: "Brotes frecuentes e inflamación" },
          { label: "Severo", help: "Acné doloroso, quístico o persistente" },
          { label: "No estoy seguro", help: "Prefiero que el médico me oriente" }
        ]
      },
      {
        id: "acneAreas",
        title: "¿En qué zonas tienes acné?",
        type: "multiple",
        options: ["Cara", "Espalda", "Pecho", "Cuello", "Hombros"]
      },
      {
        id: "duration",
        title: "¿Cuánto tiempo llevas con acné?",
        type: "single",
        options: ["Menos de 3 meses", "3 a 6 meses", "Más de 6 meses", "Más de 1 año"]
      },
      {
        id: "previousTreatments",
        title: "¿Has usado tratamientos antes?",
        type: "single",
        options: ["Solo skincare", "Cremas dermatológicas", "Antibióticos", "Isotretinoína antes", "Ninguno"]
      },
      {
        id: "conditions",
        title: "¿Tienes alguna de estas condiciones?",
        type: "multipleExclusiveNone",
        noneValue: "Ninguna de las anteriores",
        options: [
          "Embarazo actual o posible embarazo",
          "Lactancia",
          "Enfermedad hepática",
          "Colesterol o triglicéridos altos",
          "Depresión severa o ideas suicidas",
          "Alergia a medicamentos",
          "Ninguna de las anteriores"
        ]
      },
      {
        id: "currentMedication",
        title: "¿Actualmente tomas algún medicamento?",
        type: "singleWithText",
        triggerValue: "Sí",
        textId: "currentMedicationDetails",
        textLabel: "Escribe qué medicamento tomas actualmente",
        options: ["Sí", "No"]
      },
      {
        id: "medicalFollowup",
        title: "¿Buscas tratamiento con seguimiento médico?",
        type: "single",
        options: ["Sí, quiero seguimiento", "Solo quiero información", "No estoy seguro"]
      },
      {
        id: "contact",
        title: "Datos para contactarte",
        type: "contact",
        fields: [
          { id: "fullName", label: "Nombre completo", inputMode: "text", pattern: "letters" },
          { id: "age", label: "Edad", inputMode: "numeric", pattern: "number" },
          { id: "whatsapp", label: "WhatsApp", inputMode: "tel", pattern: "number" },
          { id: "email", label: "Correo electrónico", inputMode: "email", pattern: "email" },
          { id: "cityState", label: "Ciudad / Estado", inputMode: "text", pattern: "required" }
        ]
      }
    ];

    const answers = {};
    let currentStep = -1;
    let isComplete = false;

    const app = document.querySelector("#app");
    const progressTrack = document.querySelector("#progressTrack");
    const progressMeta = document.querySelector("#progressMeta");
    const progressFill = document.querySelector("#progressFill");
    const progressPercent = document.querySelector("#progressPercent");
    const stepLabel = document.querySelector("#stepLabel");
    let approvalTimer = null;
    let lastSubmissionAt = 0;
    const paymentLinks = {
      esencial: "PEGAR_LINK_PAGO_ESENCIAL",
      avanzado: "PEGAR_LINK_PAGO_AVANZADO",
      elite: "PEGAR_LINK_PAGO_ELITE"
    };
    const plans = {
      esencial: {
        plan: "Esencial",
        price: 1590,
        medication: "Neotrex",
        reason: "Tu evaluación sugiere un caso inicial, por lo que puedes comenzar con un protocolo esencial."
      },
      avanzado: {
        plan: "Avanzado",
        price: 1890,
        medication: "Vastionin",
        reason: "Tu evaluación indica brotes frecuentes e inflamación, por lo que recomendamos un protocolo más completo."
      },
      elite: {
        plan: "Elite",
        price: 2690,
        medication: "Epuris",
        reason: "Tu evaluación muestra características de acné persistente o de mayor intensidad, por lo que recomendamos un acompañamiento más completo."
      }
    };
    const checkoutThemes = {
      esencial: {
        cardClass: "checkout-esencial",
        accent: "#4AAFC0",
        background: "#FFFFFF",
        text: "#071B34",
        button: "#4AAFC0",
        label: "Checkout Esencial"
      },
      avanzado: {
        cardClass: "checkout-avanzado",
        accent: "#4AAFC0",
        background: "#EAF7FB",
        text: "#071B34",
        button: "#4AAFC0",
        label: "Checkout Avanzado"
      },
      elite: {
        cardClass: "checkout-elite",
        accent: "#D6C08D",
        background: "#07152B",
        text: "#FFFFFF",
        button: "#D6C08D",
        label: "Checkout Elite"
      }
    };
    const legacyPlanAliases = {
      esencial: plans.esencial,
      plan_esencial: plans.esencial,
      nova_esencial: plans.esencial,
      avanzado: plans.avanzado,
      plan_avanzado: plans.avanzado,
      nova_avanzado: plans.avanzado,
      elite: plans.elite,
      plan_elite: plans.elite,
      nova_elite: plans.elite
    };
    const API_BASE_URL = window.DERMATIKA_API_BASE_URL || "";
    const STRIPE_PAYMENTS = {
      createIntentEndpoint: "/api/create-stripe-payment-intent",
      fallbackCreateIntentEndpoint: "/api/create-payment-intent"
    };
    const stripeState = {
      stripe: null,
      elements: null,
      clientSecret: "",
      paymentIntentId: "",
      planKey: "",
      isReady: false
    };
    const ANALYTICS = {
      track(eventName, eventPayload = {}) {
        const payload = {
          event: eventName,
          source: "dermatika_evaluacion",
          timestamp: new Date().toISOString(),
          patient_reference: ensureInternalFolio(),
          ...eventPayload
        };
        if (typeof window.gtag === "function") window.gtag("event", eventName, eventPayload);
        if (typeof window.fbq === "function") window.fbq("trackCustom", eventName, eventPayload);
        try {
          fetch(apiUrl("/api/track-event"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            keepalive: true
          }).catch(() => {});
        } catch (error) {
          reportIntegrationIssue("Analytics no disponible", error);
        }
      }
    };

    function reportIntegrationIssue(message, error) {
      if (window.DERMATIKA_DEBUG === true) {
        console.warn(message, error?.message || error);
      }
    }

    function apiUrl(path) {
      if (/^https?:\/\//i.test(path)) return path;
      return `${API_BASE_URL}${path}`;
    }

    async function loadPublicConfig() {
      try {
        const response = await fetch(apiUrl("/api/config"));
        if (!response.ok) return null;
        const config = await response.json();
        window.DERMATIKA_CONFIG = {
          ...(window.DERMATIKA_CONFIG || {}),
          ...config,
          STRIPE_PUBLIC_KEY: config?.publicKey || config?.STRIPE_PUBLIC_KEY || window.DERMATIKA_CONFIG?.STRIPE_PUBLIC_KEY || ""
        };
        if (config?.paymentLinks) {
          Object.assign(paymentLinks, {
            esencial: config.paymentLinks.esencial || paymentLinks.esencial,
            avanzado: config.paymentLinks.avanzado || paymentLinks.avanzado,
            elite: config.paymentLinks.elite || paymentLinks.elite
          });
        }
        if (config?.GA4_ID && !window.gtag) {
          window.dataLayer = window.dataLayer || [];
          window.gtag = function gtag(){ window.dataLayer.push(arguments); };
          window.gtag("js", new Date());
          window.gtag("config", config.GA4_ID, { send_page_view: false });
        }
        return config;
      } catch (error) {
        reportIntegrationIssue("Config pública no disponible", error);
        return null;
      }
    }

    function createPatientReference() {
      return `DMK-${new Date().toISOString().slice(0, 10).replace(/-/g, "")}-${Math.floor(1000 + Math.random() * 9000)}`;
    }

    function ensureInternalFolio() {
      const key = "dermatika_internal_folio";
      let folio = "";
      try {
        folio = localStorage.getItem(key) || "";
        if (!folio) {
          folio = createPatientReference();
          localStorage.setItem(key, folio);
        }
      } catch (error) {
        folio = folio || createPatientReference();
      }
      return folio;
    }

    function setCompatValue(id, value) {
      const field = document.getElementById(id);
      if (!field) return;
      if (field.type === "checkbox") {
        field.checked = Boolean(value);
        return;
      }
      field.value = Array.isArray(value) ? value.join(", ") : String(value ?? "");
    }

    function planKeyFromSelection(planName = window.formData?.selectedPlan || "") {
      const normalized = String(planName).toLowerCase();
      if (normalized.includes("elite")) return "elite";
      if (normalized.includes("avanzado")) return "avanzado";
      return "esencial";
    }

    function getCurrentPlanPayload() {
      const key = planKeyFromSelection();
      const plan = legacyPlanAliases[key] || plans.esencial;
      const selectedPrice = Number(window.formData?.selectedPrice || plan.price);
      const selectedPlan = window.formData?.selectedPlan || plan.plan;
      const selectedMedication = window.formData?.selectedMedication || plan.medication;
      return {
        plan_key: key,
        plan_name: selectedPlan,
        plan_price: selectedPrice,
        amount: selectedPrice,
        currency: "mxn",
        medication: selectedMedication,
        selectedPlan,
        selectedPrice,
        selectedMedication
      };
    }

    function getCheckoutTheme() {
      const key = planKeyFromSelection();
      return { key, ...(checkoutThemes[key] || checkoutThemes.esencial) };
    }

    function syncLegacyMedicalForm(payload = window.formData || {}) {
      const data = { ...answers, ...payload };
      const shipping = data.shipping || {};
      const fullName = data.nombre || data.fullName || data.name || "";
      const lastName = data.apellido || data.lastName || "";
      const combinedName = `${fullName} ${lastName}`.trim() || data.fullName || data.name || "";
      const ageValue = data.age || data.edad || data.ageRange || "";
      const conditions = Array.isArray(data.conditions) ? data.conditions.join(", ") : (data.conditions || "");

      setCompatValue("name", combinedName);
      setCompatValue("lastName", lastName);
      setCompatValue("birthdate", data.birthdate || "");
      setCompatValue("age", ageValue);
      setCompatValue("phone", data.whatsapp || data.phone || "");
      setCompatValue("email", data.correo || data.email || "");
      setCompatValue("city", data.cityState || data.estado || data.city || "");
      setCompatValue("severity", data.acne || data.acneSeverity || "");
      setCompatValue("time", data.tiempo || data.duration || "");
      setCompatValue("previous", Array.isArray(data.previousTreatments) ? data.previousTreatments.join(", ") : (data.previousTreatments || ""));
      setCompatValue("affectedAreas", Array.isArray(data.acneAreas) ? data.acneAreas.join(", ") : (data.zonas || data.acneAreas || ""));
      setCompatValue("lesionTypes", data.lesionTypes || data.acne || data.acneSeverity || "");
      setCompatValue("scarsOrSpots", data.scarsOrSpots || "");
      setCompatValue("history", data.history || "");
      setCompatValue("pregnancy", data.embarazo ? "Sí" : "No");
      setCompatValue("meds", data.currentMedicationDetails || data.currentMedication || "");
      setCompatValue("conditions", conditions);

      try {
        const response = await fetch(apiUrl("/api/intake"), {
          method: "POST",
          body: fd,

        });

    function handleCheckoutReturn() {
      const params = new URLSearchParams(window.location.search);
      const paymentStatus = params.get("payment_status") || params.get("redirect_status");
      if (paymentStatus === "succeeded" || paymentStatus === "success") {
        renderThankYouPage();
        ANALYTICS.track("payment_success", getCurrentPlanPayload());
        return true;
      }
      return false;
    }

    async function handleStripeReturn() {
      const params = new URLSearchParams(window.location.search);
      const clientSecret = params.get("payment_intent_client_secret");
      if (!clientSecret || !window.Stripe) return false;
      const publicKey = window.DERMATIKA_CONFIG?.STRIPE_PUBLIC_KEY || localStorage.getItem("dermatika_stripe_public_key") || "";
      if (!publicKey) return false;
      try {
        const stripe = window.Stripe(publicKey);
        const { paymentIntent } = await stripe.retrievePaymentIntent(clientSecret);
        if (paymentIntent?.status === "succeeded") {
          await submitIntake(paymentIntent.id || "");
          ANALYTICS.track("payment_success", {
            ...getCurrentPlanPayload(),
            transaction_id: paymentIntent.id || ensureInternalFolio()
          });
          renderThankYouPage();
          return true;
        }
      } catch (error) {
        reportIntegrationIssue("Stripe return error", error);
      }
      return false;
    }

      const params = new URLSearchParams(window.location.search);
      const token = params.get("resume");
      if (!token) return null;
      try {
        const response = await fetch(apiUrl(`/api/resume/${encodeURIComponent(token)}`));
        if (!response.ok) return null;
        const data = await response.json();
        window.formData = { ...window.formData, ...(data?.formData || data || {}) };
        syncLegacyMedicalForm(window.formData);
        return data;
      } catch (error) {
        reportIntegrationIssue("Resume link no disponible", error);
        return null;
      }
    }

    function startQuiz() {

      currentStep = 0;

    }

    function updateProgress() {
      const percent = Math.round(((currentStep + 1) / questions.length) * 100);
      progressTrack.classList.add("is-active");
      progressMeta.classList.add("is-active");
      progressFill.style.width = `${percent}%`;
      progressPercent.textContent = `${percent}%`;
      stepLabel.textContent = `Paso ${currentStep + 1} de ${questions.length}`;
    }

    function isStepValid(question) {
      const value = answers[question.id];
      if (question.type === "multiple" || question.type === "multipleExclusiveNone") {
        return Array.isArray(value) && value.length > 0;
      }
      if (question.type === "singleWithText") {
        if (!value) return false;
        if (value === question.triggerValue) return Boolean((answers[question.textId] || "").trim());
        return true;
      }
      if (question.type === "contact") {
        return question.fields.every((field) => {
          const input = document.querySelector(`#${field.id}`);
          const value = input ? input.value : answers[field.id] || "";
          answers[field.id] = value;
          return validateField(field, value).ok;
        });
      }
      return Boolean(value);
    }

    function renderStep() {
      isComplete = false;
      const question = questions[currentStep];
      updateProgress();

      app.innerHTML = `
        <section class="card">
          <p class="eyebrow">Evaluación DERMÁTIKA</p>
          <h2>${question.title}</h2>
          ${question.type === "contact" ? "<p class=\"question-help\">Usaremos estos datos para dar seguimiento a tu evaluación. Todos los campos son obligatorios.</p>" : ""}
          <div id="questionBody"></div>
          <div class="actions">
            <button class="button button-secondary" type="button" id="backButton">Atrás</button>
            <button class="button" type="button" id="nextButton" disabled>${currentStep === questions.length - 1 ? "Enviar evaluación" : "Siguiente"}</button>
          </div>
        </section>
      `;

      renderQuestionBody(question);

      document.querySelector("#backButton").addEventListener("click", goBack);
      document.querySelector("#nextButton").addEventListener("click", goNext);
      updateNextState();
    }

    function renderQuestion(stepIndex) {
      currentStep = stepIndex;
      renderStep();
    }

    function renderQuestionBody(question) {
      const body = document.querySelector("#questionBody");

      if (question.type === "contact") {
        body.innerHTML = `
          <div class="fields">
            ${question.fields.map((field) => `
              <div class="field">
                <label for="${field.id}">${field.label}</label>
                <input id="${field.id}" type="${field.pattern === "email" ? "email" : field.pattern === "number" ? "tel" : "text"}" inputmode="${field.inputMode}" autocomplete="${field.id === "email" ? "email" : field.id === "whatsapp" ? "tel" : field.id === "fullName" ? "name" : "on"}" maxlength="${field.pattern === "number" ? "15" : field.pattern === "email" ? "96" : "90"}" value="${answers[field.id] || ""}">
                <span class="field-error" data-error-for="${field.id}"></span>
              </div>
            `).join("")}
          </div>
        `;

        question.fields.forEach((field) => {
          const input = document.querySelector(`#${field.id}`);
          input.addEventListener("input", () => {
            let value = input.value;
            if (field.pattern === "number") value = value.replace(/\D/g, "");
            if (field.pattern === "letters") value = value.replace(/[^a-zA-ZÀ-ÿ\s'.-]/g, "");
            input.value = value;
            answers[field.id] = value;
            showFieldError(field);
            updateNextState();
          });
          showFieldError(field, false);
        });
        return;
      }

      body.innerHTML = `
        <div class="options">
          ${question.options.map((option) => {
            const label = optionLabel(option);
            const help = optionHelp(option);
            const inputType = question.type === "single" || question.type === "singleWithText" ? "radio" : "checkbox";
            const checked = isChecked(question, label) ? "checked" : "";
            return `
              <label class="option-card">
                <input type="${inputType}" name="${question.id}" value="${label}" ${checked}>
                <span>
                  <strong>${label}</strong>
                  ${help ? `<small>${help}</small>` : ""}
                </span>
              </label>
            `;
          }).join("")}
        </div>
        ${question.type === "singleWithText" ? `
          <div class="field ${answers[question.id] === question.triggerValue ? "" : "hidden"}" id="conditionalField">
            <label for="${question.textId}">${question.textLabel}</label>
            <textarea id="${question.textId}">${answers[question.textId] || ""}</textarea>
            <span class="field-error" data-error-for="${question.textId}"></span>
          </div>
        ` : ""}
      `;

      document.querySelectorAll(`input[name="${question.id}"]`).forEach((input) => {
        input.addEventListener("change", () => handleOptionChange(question, input));
      });

      if (question.type === "singleWithText") {
        const textarea = document.querySelector(`#${question.textId}`);
        textarea?.addEventListener("input", () => {
          answers[question.textId] = textarea.value;
          showConditionalError(question);
          updateNextState();
        });
        showConditionalError(question, false);
      }
    }

    function isChecked(question, label) {
      const value = answers[question.id];
      return Array.isArray(value) ? value.includes(label) : value === label;
    }

    function handleOptionChange(question, input) {
      if (question.type === "single" || question.type === "singleWithText") {
        answers[question.id] = input.value;
      } else {
        let current = Array.isArray(answers[question.id]) ? [...answers[question.id]] : [];
        if (question.type === "multipleExclusiveNone") {
          if (input.value === question.noneValue && input.checked) {
            current = [question.noneValue];
            document.querySelectorAll(`input[name="${question.id}"]`).forEach((item) => {
              item.checked = item.value === question.noneValue;
            });
          } else {
            current = current.filter((item) => item !== question.noneValue);
            const noneInput = document.querySelector(`input[name="${question.id}"][value="${question.noneValue}"]`);
            if (noneInput) noneInput.checked = false;
            current = input.checked ? [...current, input.value] : current.filter((item) => item !== input.value);
          }
        } else {
          current = input.checked ? [...current, input.value] : current.filter((item) => item !== input.value);
        }
        answers[question.id] = [...new Set(current)];
      }

      if (question.type === "singleWithText") {
        const field = document.querySelector("#conditionalField");
        if (field) field.classList.toggle("hidden", answers[question.id] !== question.triggerValue);
        if (answers[question.id] !== question.triggerValue) answers[question.textId] = "";
        showConditionalError(question);
      }

      updateNextState();
    }

    function validateField(field, value) {
      const clean = value.trim();
      if (!clean) return { ok: false, message: "Campo obligatorio." };
      if (field.pattern === "letters" && !/^[a-zA-ZÀ-ÿ\s'.-]+$/.test(clean)) return { ok: false, message: "Usa solo letras." };
      if (field.pattern === "number" && !/^\d+$/.test(clean)) return { ok: false, message: "Usa solo números." };
      if (field.id === "age" && (Number(clean) < 1 || Number(clean) > 120)) return { ok: false, message: "Ingresa una edad válida." };
      if (field.pattern === "email" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(clean)) return { ok: false, message: "Correo no válido." };
      return { ok: true, message: "" };
    }

    function showFieldError(field, shouldShow = true) {
      const error = document.querySelector(`[data-error-for="${field.id}"]`);
      if (!error) return;
      const result = validateField(field, answers[field.id] || "");
      error.textContent = shouldShow && !result.ok ? result.message : "";
    }

    function showConditionalError(question, shouldShow = true) {
      const error = document.querySelector(`[data-error-for="${question.textId}"]`);
      if (!error) return;
      const needsText = answers[question.id] === question.triggerValue;
      error.textContent = shouldShow && needsText && !(answers[question.textId] || "").trim() ? "Campo obligatorio." : "";
    }

    function updateNextState() {
      const question = questions[currentStep];
      const nextButton = document.querySelector("#nextButton");
      if (nextButton) nextButton.disabled = !isStepValid(question);
    }

    function goBack() {
      if (currentStep <= 0) {
        currentStep = -1;
        renderWelcomeScreen();
        return;
      }
      currentStep -= 1;
      renderQuestion(currentStep);
    }

    function goNext() {
      const question = questions[currentStep];
      if (question.type === "contact") {
        question.fields.forEach((field) => showFieldError(field));
      }
      if (!isStepValid(question)) return;

      if (currentStep === questions.length - 1) {
        window.formData = buildFormData();
        submitEvaluation(window.formData);
        ANALYTICS.track("form_submit", { step: "questionnaire_complete" });
        if (evaluateEligibility() === "no_aprobado") {
          mostrarPantallaNoAprobado();
        } else {
          renderMedicalReviewScreen();
        }
        return;
      }

      currentStep += 1;
      ANALYTICS.track(`form_step_${currentStep + 1}`, { step: questions[currentStep]?.id || "", step_index: currentStep + 1 });
      ANALYTICS.track("form_step_view", { step: questions[currentStep]?.id || "", step_index: currentStep + 1 });
      renderQuestion(currentStep);
    }

    function buildFormData() {
      const condiciones = Array.isArray(answers.conditions) ? answers.conditions : [];
      return {
        ...answers,
        acne: answers.acneSeverity || "",
        tiempo: answers.duration || "",
        zonas: Array.isArray(answers.acneAreas) ? answers.acneAreas.join(", ") : "",
        embarazo: condiciones.includes("Embarazo actual o posible embarazo"),
        lactancia: condiciones.includes("Lactancia"),
        enfermedad_hepatica: condiciones.includes("Enfermedad hepática"),
        depresion_severa: condiciones.includes("Depresión severa o ideas suicidas"),
        alergia_medicamentos: condiciones.includes("Alergia a medicamentos")
      };
    }

      const respuestas = window.formData;

        respuestas.lactancia === true ||
        respuestas.enfermedad_hepatica === true ||
        respuestas.depresion_severa === true ||
        respuestas.alergia_medicamentos === true
      ) {
        return "no_aprobado";
      }

      return "aprobado";
    }

    function goToContact(e) {
      e.preventDefault();
      const inputs = [
        document.querySelector("#identityName"),
        document.querySelector("#identityLastName"),
        document.querySelector("#estado")
      ];
      let isValid = true;

      inputs.forEach((input) => {
        const message = validateLeadField(input);
        const error = document.querySelector(`[data-lead-error="${input.id}"]`);
        if (error) error.textContent = message;
        if (message) isValid = false;
      });

      if (!isValid) return;

      window.formData = {
        ...window.formData,
        nombre: document.querySelector("#identityName").value.trim(),
        apellido: document.querySelector("#identityLastName").value.trim(),
        estado: document.querySelector("#estado").value.trim()
      };
      submitEvaluation(window.formData);

      renderContactStep();
    }

    function submitLead(e) {
      e.preventDefault();
      if (hasBotSignal(["leadWebsite"])) return;
      const inputs = Array.from(e.target.querySelectorAll("input")).filter((input) => input.id !== "leadWebsite");
      let isValid = true;

      inputs.forEach((input) => {
        if (input.type === "checkbox") return;
        if (input.id === "leadWhatsapp") input.value = input.value.replace(/\D/g, "");
        const message = validateLeadField(input);
        const error = document.querySelector(`[data-lead-error="${input.id}"]`);
        if (error) error.textContent = message;
        if (message) isValid = false;
      });

      const privacyAccepted = document.querySelector("#privacyAccepted")?.checked;
      const privacyError = document.querySelector('[data-lead-error="privacyAccepted"]');
      if (privacyError) privacyError.textContent = privacyAccepted ? "" : "Para continuar, confirma que leíste y aceptas el aviso de privacidad.";
      if (!privacyAccepted) isValid = false;

      if (!isValid) return;
      if (!canSubmitNow()) return;

      window.formData = {
        ...window.formData,
        correo: document.querySelector("#leadEmail").value.trim(),
        whatsapp: document.querySelector("#leadWhatsapp").value.trim(),
        acepta_privacidad: true
      };

      submitEvaluation(window.formData);
      ANALYTICS.track("lead_contact_complete", { email: window.formData.correo ? "present" : "missing" });
      renderPostEligibilityPage();
    }

    function getMedicalPriority() {
      const acne = (window.formData.acne || "").toLowerCase();
      if (acne.includes("severo")) return "Alta";
      if (acne.includes("moderado")) return "Moderada";
      return "Inicial";
    }

    function getRecommendedPlan() {
      const acne = String(
        window.formData?.acne ||
        window.formData?.acneSeverity ||
        window.formData?.answers?.acneSeverity ||
        ""
      ).toLowerCase();

      if (acne.includes("severo")) {
        return plans.elite;
      }

      if (acne.includes("moderado")) {
        return plans.avanzado;
      }

      if (acne.includes("leve")) {
        return plans.esencial;
      }

      return {
        ...plans.avanzado,
        reason: "Como aún no estás seguro del nivel de acné, recomendamos una revisión más completa para definir el mejor protocolo."
      };
    }

    function startApprovalCountdown() {
      if (approvalTimer) clearInterval(approvalTimer);
      let remaining = 10 * 60 + 55;
      const countdown = document.querySelector("#approvalCountdown");
      const update = () => {
        const minutes = String(Math.floor(remaining / 60)).padStart(2, "0");
        const seconds = String(remaining % 60).padStart(2, "0");
        if (countdown) countdown.textContent = `${minutes}:${seconds}`;
        if (remaining > 0) remaining -= 1;
      };
      update();
      approvalTimer = setInterval(update, 1000);
    }

    async function initializeStripePayment() {
      const panel = document.querySelector("#stripePaymentPanel");
      const paymentHost = document.querySelector("#paymentElement");
      const expressHost = document.querySelector("#expressCheckoutElement");
      const planPayload = getCurrentPlanPayload();
      const planKey = planPayload.plan_key;
      if (stripeState.isReady && stripeState.elements && stripeState.planKey === planKey) return true;
      if (!panel || !paymentHost) return false;

      panel.classList.add("is-visible");
      showPaymentStatus("Preparando pago seguro...");
      showPaymentError("");
      paymentHost.classList.add("is-loading");
      paymentHost.textContent = "Preparando pago seguro...";
      if (expressHost) {
        expressHost.classList.add("is-loading");
        expressHost.textContent = "Preparando opciones de pago...";
      }

      const shipping = window.formData?.shipping || {};
      const body = {
        planKey,
        amount: Number(planPayload.amount || 0),
        currency: "MXN",
        email: window.formData?.correo || shipping.shipEmail || "",
        patientName: shipping.shipFullName || `${window.formData?.nombre || ""} ${window.formData?.apellido || ""}`.trim(),
        phone: window.formData?.whatsapp || shipping.shipWhatsapp || "",
        patientReference: ensureInternalFolio(),
        externalReference: ensureInternalFolio(),
        sessionId: ensureInternalFolio(),
        shippingPostalCode: shipping.shipZip || "",
        turnstileToken: document.querySelector("#turnstileToken")?.value || ""
      };

      try {
        let response = await fetch(apiUrl(STRIPE_PAYMENTS.createIntentEndpoint), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (!response.ok) {
          response = await fetch(apiUrl(STRIPE_PAYMENTS.fallbackCreateIntentEndpoint), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
        }
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.clientSecret || !result.publishableKey) {
          throw new Error(result.error || result.detail || "stripe_not_ready");
        }
        if (!window.Stripe) throw new Error("stripe_js_not_loaded");

        try {
          localStorage.setItem("dermatika_stripe_public_key", result.publishableKey);
        } catch (error) {
          reportIntegrationIssue("No se pudo guardar public key local", error);
        }

        stripeState.stripe = window.Stripe(result.publishableKey);
        stripeState.clientSecret = result.clientSecret;
        stripeState.paymentIntentId = result.paymentIntentId || "";
        stripeState.planKey = planKey;
        stripeState.elements = stripeState.stripe.elements({
          clientSecret: result.clientSecret,
          appearance: {
            theme: "stripe",
            variables: {
              colorPrimary: "#4AAFC0",
              colorText: "#0F1B2D",
              colorBackground: "#FFFFFF",
              borderRadius: "16px",
              fontFamily: "Inter, system-ui, sans-serif"
            }
          }
        });

        if (expressHost) {
          try {
            expressHost.replaceChildren();
            expressHost.classList.remove("is-loading");
            const expressCheckout = stripeState.elements.create("expressCheckout", {
              buttonTheme: { applePay: "black", googlePay: "black" },
              buttonType: { applePay: "plain", googlePay: "plain" }
            });
            expressCheckout.mount("#expressCheckoutElement");
            expressCheckout.on("confirm", async () => {
              await confirmStripePayment("Confirmando pago...");
            });
          } catch (error) {
            expressHost.hidden = true;
            document.querySelector("#walletFallback")?.removeAttribute("hidden");
            reportIntegrationIssue("Express checkout no disponible", error);
          }
        }

        paymentHost.replaceChildren();
        paymentHost.classList.remove("is-loading");
        const paymentElement = stripeState.elements.create("payment", {
          layout: "tabs",
          defaultValues: {
            billingDetails: {
              name: body.patientName,
              email: body.email,
              phone: body.phone
            }
          }
        });
        paymentElement.mount("#paymentElement");
        stripeState.isReady = true;
        showPaymentStatus("Pago seguro listo. Revisa tus datos y confirma para continuar.");
        setPaymentLoading(false);
        return true;
      } catch (error) {
        stripeState.isReady = false;
        paymentHost.classList.remove("is-loading");
        paymentHost.textContent = "No se pudieron cargar los campos de pago seguro.";
        showPaymentError("El pago seguro no está disponible en este momento. Tu evaluación quedó guardada para seguimiento.");
        setPaymentLoading(false);
        reportIntegrationIssue("Stripe init error", error);
        return false;
      }
    }

    async function confirmStripePayment(loadingMessage = "Procesando pago seguro...") {
      if (!stripeState.stripe || !stripeState.elements || !stripeState.clientSecret) {
        showPaymentError("El pago seguro aún se está preparando. Intenta de nuevo en unos segundos.");
        return false;
      }
      setPaymentLoading(true, loadingMessage);
      showPaymentError("");
      try {
        const submitResult = await stripeState.elements.submit();
        if (submitResult?.error) throw submitResult.error;
        const { error, paymentIntent } = await stripeState.stripe.confirmPayment({
          elements: stripeState.elements,
          clientSecret: stripeState.clientSecret,
          confirmParams: {
            return_url: `${window.location.origin}${window.location.pathname}?payment_status=succeeded`
          },
          redirect: "if_required"
        });
        if (error) throw error;
        if (paymentIntent?.status === "succeeded") {
          await submitIntake(paymentIntent.id || stripeState.paymentIntentId || "");
          ANALYTICS.track("purchase", {
            ...getCurrentPlanPayload(),
            transaction_id: paymentIntent.id || stripeState.paymentIntentId || ensureInternalFolio(),
            value: Number(window.formData?.selectedPrice || 0),
            currency: "MXN"
          });
          ANALYTICS.track("payment_success", getCurrentPlanPayload());
          renderThankYouPage();
          return true;
        }
        showPaymentStatus("Tu pago quedó en revisión con la pasarela. Te contactaremos si se requiere confirmación adicional.");
        setPaymentLoading(false);
        return false;
      } catch (error) {
        showPaymentError(error?.message || "No pudimos confirmar el pago. Revisa el método o intenta nuevamente.");
        setPaymentLoading(false);
        reportIntegrationIssue("Stripe confirm error", error);
        return false;
      }
    }

    function validateCheckoutField(input) {
      const value = input.value.trim();
      if (!value && input.id !== "shipAddress2") return "Campo obligatorio.";
      if (input.id === "shipEmail" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return "Correo no válido.";
      if (input.id === "shipWhatsapp" && !/^\d+$/.test(value)) return "Usa solo números.";
      if (input.id === "shipWhatsapp" && (value.length < 10 || value.length > 15)) return "Ingresa un número válido.";
      if (input.id === "shipZip" && !/^\d+$/.test(value)) return "Usa solo números.";
      if (input.id === "shipZip" && value.length !== 5) return "Ingresa 5 dígitos.";
      return "";
    }

    function saveLeadData() {
      const fields = ["shipFullName", "shipEmail", "shipWhatsapp", "shipAddress1", "shipAddress2", "shipCity", "shipState", "shipZip"];
      window.formData = {
        ...window.formData,
        shipping: Object.fromEntries(fields.map((id) => [id, document.querySelector(`#${id}`)?.value.trim() || ""]))
      };
      submitEvaluation(window.formData);
    }

    async function goToPayment(e) {
      if (e) e.preventDefault();
      if (hasBotSignal(["checkoutWebsite"])) return;
      const inputs = Array.from(document.querySelectorAll("#checkout input, #checkout select")).filter((input) => input.id !== "checkoutWebsite");
      let isValid = true;
      const submitButton = e?.target?.querySelector('button[type="submit"]');

      inputs.forEach((input) => {
        if (input.id === "shipWhatsapp" || input.id === "shipZip") input.value = input.value.replace(/\D/g, "");
        const message = validateCheckoutField(input);
        const error = document.querySelector(`[data-checkout-error="${input.id}"]`);
        if (error) error.textContent = message;
        if (message) isValid = false;
      });

      if (!isValid) return;
      if (!canSubmitNow()) return;
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = "Preparando pago seguro...";
      }
      saveLeadData();
      submitIntake("");
      ANALYTICS.track("begin_checkout", getCurrentPlanPayload());
      ANALYTICS.track("payment_attempt", getCurrentPlanPayload());

      if (stripeState.isReady) {
        await confirmStripePayment();
        return;
      }

      const plan = (window.formData.selectedPlan || "").toLowerCase();
      let target = "";
      if (plan.includes("esencial")) target = paymentLinks.esencial;
      if (plan.includes("avanzado")) target = paymentLinks.avanzado;
      if (plan.includes("elite")) target = paymentLinks.elite;

      if (!target || target.startsWith("PEGAR_LINK")) {
        await initializeStripePayment();
        return;
      }

      window.location.href = target;
    }

    function revealOnScroll() {
      const items = document.querySelectorAll(".reveal-post");
      if (!("IntersectionObserver" in window)) {
        items.forEach((item) => item.classList.add("is-visible"));
        return;
      }
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });
      items.forEach((item, index) => {
        item.style.transitionDelay = `${Math.min(index * 45, 260)}ms`;
        observer.observe(item);
      });
    }

    function continueToPayment() {
      if (!window.formData.selectedPlan) return;
      document.querySelector("#checkout")?.scrollIntoView({ behavior: "smooth" });
    }

    function renderThankYouPage() {
      if (approvalTimer) clearInterval(approvalTimer);
      setFinalProgress("Pago recibido");
      app.innerHTML = `
        <section class="card intro">
          <p class="eyebrow">DERMÁTIKA</p>
          <h1>Estamos preparando tu tratamiento dermatológico y tu rutina personalizada.</h1>
          <p>Gracias por confiar en Dermátika. Nuestro equipo revisará tu información con cuidado para avanzar con tu protocolo personalizado y los siguientes pasos de tu tratamiento.</p>
          <div class="process-loader" aria-label="Preparación en proceso">
            <span aria-hidden="true"></span>
            <p>Tiempo aproximado de revisión inicial: 24 a 48 horas hábiles.</p>
          </div>
          <p class="summary-note">Tu piel puede cambiar. Hoy diste el primer paso para recuperar la confianza.</p>
          <button class="button button-full" type="button" onclick="goHome()">Volver al inicio</button>
        </section>
      `;
    }

    function goHome() {
      window.location.href = "index.html";
    }

    function renderHomePage() {
      goHome();
    }

    function submitEvaluation(payload) {
      const evaluationPayload = {
        brand: "DERMÁTIKA",
        submittedAt: new Date().toISOString(),
        answers: { ...payload }
      };

      syncLegacyMedicalForm(payload);
      autosaveLead("Formulario actualizado", { payment_status: "lead" });
      return evaluationPayload;
    }

    window.renderWelcomeScreen = renderWelcomeScreen;
    window.startQuiz = startQuiz;
    window.renderQuestion = renderQuestion;
    window.submitEvaluation = submitEvaluation;
    window.submitLead = submitLead;
    window.openPrivacyModal = openPrivacyModal;
    window.closePrivacyModal = closePrivacyModal;
    window.goHome = goHome;
    window.renderHomePage = renderHomePage;
    window.goToContact = goToContact;
    window.evaluateEligibility = evaluateEligibility;
    window.renderMedicalReviewScreen = renderMedicalReviewScreen;
    window.renderContactStep = renderContactStep;
    window.renderPostEligibilityPage = renderPostEligibilityPage;
    window.startApprovalCountdown = startApprovalCountdown;
    window.getRecommendedPlan = getRecommendedPlan;
    window.selectPlan = selectPlan;
    window.toggleFAQ = toggleFAQ;
    window.revealOnScroll = revealOnScroll;
    window.toggleTimeline = toggleTimeline;
    window.continueToPayment = continueToPayment;
    window.renderCheckoutSection = renderCheckoutSection;
    window.goToPayment = goToPayment;
    window.saveLeadData = saveLeadData;
    window.renderThankYouPage = renderThankYouPage;
    window.mostrarPantallaNoAprobado = mostrarPantallaNoAprobado;
    window.mostrarPantallaAprobado = mostrarPantallaAprobado;
    window.apiUrl = apiUrl;
    window.loadPublicConfig = loadPublicConfig;
    window.STRIPE_PAYMENTS = STRIPE_PAYMENTS;
    window.ANALYTICS = ANALYTICS;
    window.createPatientReference = createPatientReference;
    window.ensureInternalFolio = ensureInternalFolio;
    window.getCurrentPlanPayload = getCurrentPlanPayload;
    window.collectMedicalFormData = collectMedicalFormData;
    window.collectAutosaveData = collectAutosaveData;
    window.autosaveLead = autosaveLead;
    window.submitIntake = submitIntake;
    window.handleCheckoutReturn = handleCheckoutReturn;
    window.handleStripeReturn = handleStripeReturn;
    window.handleResumeLink = handleResumeLink;
    window.formData = answers;
    window.dermatikaEvaluationAnswers = answers;
    window.plans = plans;

    loadPublicConfig();
    handleResumeLink();
    Promise.resolve(handleStripeReturn()).then((handled) => {
      if (!handled && !handleCheckoutReturn()) renderWelcomeScreen();
    });
  </script>
</body>
